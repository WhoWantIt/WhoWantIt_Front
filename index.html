<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/home/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhoWantIt</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      const Client_id = import.meta.env.VITE_NAVER_MAP_CLIENT_ID;
      if (Client_id) {
        const script = document.createElement("script");
        script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${Client_id}`;
        script.async = true;
        document.head.appendChild(script);
      } else {
        console.error("네이버 지도 API 키가 설정되지 않았습니다.");
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
